- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
    tagsList:
      name: ansible
      project: roboshop
      component: catalouge  
  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi Aravind, {{ GREETING | default('Good Day') }}"

  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"    

  - name: convert map to list
    ansible.builtin.debug:
      msg: "{{ tagsList | dict2items }}"    