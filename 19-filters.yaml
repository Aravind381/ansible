- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
    tagsMaps:
      name: ansible
      project: roboshop
      component: catalouge 
    tagsList:  [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalouge"
        }
    ]


  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi Aravind, {{ GREETING | default('Good Day') }}"

  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"    

  - name: convert map to list
    ansible.builtin.debug:
      msg: "{{ tagsMaps | dict2items }}"

  - name: convert list to map
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict }}"        